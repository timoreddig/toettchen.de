# Kopiere diese Datei nach develop/config!

# Die folgenden Metainfos sind nur relevant, wenn das Projekt Sally-Nutzer anstelle
# von FrontendUser verwendet.
metainfo:
   users:
      confirmation_code:
         title: Bestätigungscode
         datatype: stringline
      confirmed:
         title: bestätigt
         datatype: boolean
         helptext: 'Benutzer sind bestätigt, wenn Sie den Double Opt-In erfolgreich abgeschlossen haben.'

userworkflows:
   # Hier wird ein Export namens 'users' definiert. Es können weitere Exports
   # nach Beliebigen ergänzt werden.
   exports:
      users:
         title: Vollständige Benutzerdaten
         roles: ~                               # ~ = alle Rollen, sonst [role1,role2,...]
         attributes: [confirmed]
   passwordstrength:
      minlength: 10
      minupper: 0
      minlower: 0
      minnumbers: 0
      minspecial: 0
      crackdict: sally/addons/userworkflows/dict/combined   # immer ohne .pwd Erweiterung!
   url_helper:
      name_callback: []
   placeholders:
      params:
        format: '#%s#'
        #label: ''
        groups:
          frontenduser: default
          #metainfo: ''
          #varisale: ''

   # Um festzulegen welcher Nutzertyp auf dieser Seite Verwendung findet, setze
   # diesen Wert auf 'frontenduser' für Nutzer aus dem AddOn Frondenduser oder auf
   # 'sally', um Sally-User zu nutzen.
   usertype: frontenduser

   # Setze diesen Wert auf true, um für Benutzer mittels realURL2 URLs erzeugen
   # zu lassen. Dies ist im Moment nicht für FrontendUser-System implementiert
   # und kann daher nur mit Sally-Benutzern genutzt werden!
   enable_urls_for_users: false

